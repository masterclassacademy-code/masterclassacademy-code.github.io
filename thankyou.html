<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شكرًا لك — أكاديمي X</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100%;
  background: #080810;
  color: #D8D8E8;
  font-family: 'Cairo', sans-serif;
  direction: rtl;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}
body {
  position: relative;
  overflow: hidden;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 70% 60% at 50% 0%, rgba(201,168,76,0.15) 0%, transparent 65%),
    radial-gradient(ellipse 50% 50% at 20% 80%, rgba(201,168,76,0.06) 0%, transparent 60%);
  pointer-events: none;
}
.container {
  text-align: center;
  padding: 48px 28px;
  max-width: 560px;
  width: 100%;
  position: relative;
  z-index: 1;
  animation: fadeUp 0.7s ease both;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(30px); }
  to   { opacity:1; transform:translateY(0); }
}

.check-circle {
  width: 90px;
  height: 90px;
  background: linear-gradient(135deg, #C9A84C, #E8C76B);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 32px;
  font-size: 2.4rem;
  box-shadow: 0 0 0 16px rgba(201,168,76,0.12), 0 16px 48px rgba(201,168,76,0.3);
  animation: pop 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
}
@keyframes pop {
  from { transform: scale(0); }
  to   { transform: scale(1); }
}

h1 {
  font-size: clamp(1.8rem, 5vw, 2.8rem);
  font-weight: 900;
  color: #ffffff;
  line-height: 1.25;
  margin-bottom: 16px;
}
h1 span { color: #C9A84C; }

.subtitle {
  font-size: 1rem;
  color: #7777AA;
  line-height: 1.8;
  margin-bottom: 40px;
}

.divider {
  width: 60px;
  height: 2px;
  background: linear-gradient(90deg, #C9A84C, transparent);
  margin: 0 auto 40px;
  border-radius: 2px;
}

.cta-box {
  background: #13131E;
  border: 1px solid #252535;
  border-radius: 16px;
  padding: 32px 28px;
  margin-bottom: 28px;
}
.cta-box p {
  font-size: 1rem;
  color: #D8D8E8;
  line-height: 1.75;
  margin-bottom: 24px;
  font-weight: 600;
}
.cta-box .highlight {
  color: #C9A84C;
  font-weight: 900;
}

.wa-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  background: linear-gradient(135deg, #25D366, #1DA851);
  color: #fff;
  font-family: 'Cairo', sans-serif;
  font-weight: 900;
  font-size: 1.1rem;
  padding: 18px 36px;
  border-radius: 8px;
  text-decoration: none;
  width: 100%;
  box-shadow: 0 8px 32px rgba(37,211,102,0.35);
  transition: transform 0.2s, box-shadow 0.2s;
}
.wa-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 14px 44px rgba(37,211,102,0.5);
}
.wa-icon {
  font-size: 1.5rem;
  line-height: 1;
}

.back-link {
  font-size: 0.82rem;
  color: #7777AA;
  text-decoration: none;
  transition: color 0.2s;
  display: inline-block;
  margin-top: 20px;
}
.back-link:hover { color: #C9A84C; }

.stars {
  color: #C9A84C;
  font-size: 1.2rem;
  letter-spacing: 4px;
  margin-bottom: 20px;
}
</style>
</head>
<body>
<div class="container">
  <div class="check-circle">✓</div>

  <div class="stars">★★★★★</div>

  <h1>شكرًا لك! <span>تسجيلك وصل</span> ✨</h1>

  <p class="subtitle">
    استلمنا معلوماتك بنجاح.<br>
    سيتواصل معك فريقنا خلال <strong style="color:#C9A84C;">24 ساعة</strong> لتأكيد مكانك في البرنامج.
  </p>

  <div class="divider"></div>

  <div class="cta-box">
    <p>
      لا تنتظر — <span class="highlight">تواصل معنا الآن مباشرة عبر واتساب</span><br>
      واحصل على إجابة فورية لأي سؤال حول البرنامج.
    </p>
    <a href="https://wa.me/213558024121" class="wa-btn" target="_blank">
      <span class="wa-icon">💬</span>
      تواصل معنا على واتساب الآن
    </a>
  </div>

  <a href="academie-landing-ar.html" class="back-link">← العودة إلى الصفحة الرئيسية</a>
</div>
</body>
</html>
